name: meat_empire
description: "Fresh and tasty meat"
publish_to: 'none'
version: 1.0.6+9

environment:
  sdk: ^3.8.0

dependencies:
  auto_route: ^10.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  dots_indicator: ^4.0.1
  carousel_slider: ^5.0.0
  easy_localization: ^3.0.7
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.3.4
  queen_validators: ^1.0.1
  bcrypt: ^1.1.3
  bot_toast: ^4.1.3
  # lottie: ^3.3.1
  webview_flutter: ^4.10.0
  another_stepper: ^1.2.2
  lottie: ^3.2.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.0
  go_router: ^17.1.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^19.5.0
  fcm_config: ^3.6.5
  app_links: ^7.0.0
  keyboard_actions: ^4.2.1
  intl_phone_field: ^3.2.0
  pinput: ^6.0.2

  # mockito: ^5.4.5
  

# ---------------------


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.4.13
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  auto_route_generator: ^10.2.5
  flutter_gen_runner: ^5.8.0
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  device_preview: ^1.2.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4
  # analyzer: 6.7.0

  
    # إعدادات أيقونة التطبيق ↓
flutter_launcher_icons: 
  android: true
  ios: true
  image_path: "assets/splash/logo.png" 
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true 

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
    - assets/lottie/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Tajawal/Tajawal-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Tajawal/Tajawal-Black.ttf
          weight: 900

flutter_gen:
  integrations:
    flutter_svg: true
flutter_intl:
  enabled: true
